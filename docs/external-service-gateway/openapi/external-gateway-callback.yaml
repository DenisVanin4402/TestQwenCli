openapi: 3.1.0
info:
  title: External Service Gateway Callback API
  version: 0.1.0
  description: |
    Контракт endpoint'а, который должны реализовать сервисы-клиенты
    для получения результата async-задачи от external-service-gateway.
servers:
  - url: http://user-expertise.internal
    description: Example client service DNS
tags:
  - name: Callback
    description: Callback от gateway в сервис-клиент
paths:
  /internal/external-gateway/callbacks:
    post:
      tags:
        - Callback
      operationId: receiveExternalGatewayCallback
      summary: Принять результат async-задачи
      description: |
        Gateway вызывает этот endpoint после финального статуса async-задачи.
        Endpoint должен быть идемпотентным для at-least-once доставки:
        повторная или эквивалентная доставка того же taskId/status должна
        возвращать успешный 2xx и не создавать дублей бизнес-эффекта.
        eventId идентифицирует конкретную попытку доставки.

        Gateway считает успешным любой HTTP 2xx. Body и headers ответа не
        используются. Любой non-2xx, transport error или runtime error
        считается ошибкой доставки и обрабатывается внутренними
        retryBackoffMs/maxAttempts настройками gateway.
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCallbackAttempt'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalGatewayCallback'
            examples:
              done:
                summary: Успешный результат
                value:
                  eventId: 9eab8bb2-b8e4-4c6e-a1d9-e0d4b7b0d77a
                  taskId: 12345
                  externalId: 4c48a4dc-3226-4e63-8597-4ee793fc3c3c
                  clientService: user-expertise
                  status: DONE
                  result:
                    decision: APPROVED
                    score: '82'
                    reasonCode: OK
                  error: null
                  finishedAt: 1779395400
              failed:
                summary: Retry upstream исчерпаны
                value:
                  eventId: 33e72e4a-48f2-4140-9f22-9c7339b789ce
                  taskId: 12346
                  externalId: 1aaac57e-7922-4f68-bc01-d0b795e0e661
                  clientService: user-expertise
                  status: DEAD
                  result: null
                  error:
                    code: UPSTREAM_TRANSIENT_FAILURE
                    message: External service timeout
                    retryable: true
                  finishedAt: 1779395460
      responses:
        '2XX':
          description: |
            Callback принят. Gateway игнорирует body и headers ответа.
        default:
          description: |
            Любой non-2xx HTTP response или ошибка выполнения считается
            неуспешной попыткой доставки. Gateway планирует retry по
            собственным retryBackoffMs/maxAttempts и не использует body,
            headers ответа или Retry-After.
components:
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: |
        Correlation id callback-доставки. Dispatcher передает eventId
        текущей попытки; низкоуровневый HTTP-клиент не отправляет header,
        если requestId равен null или blank.
    XCallbackAttempt:
      name: X-Callback-Attempt
      in: header
      required: true
      schema:
        type: integer
        minimum: 1
      description: Номер попытки доставки callback
  schemas:
    ExternalGatewayCallback:
      type: object
      additionalProperties: false
      required:
        - eventId
        - taskId
        - externalId
        - clientService
        - status
        - result
        - error
        - finishedAt
      properties:
        eventId:
          type: string
          format: uuid
          description: Уникальный идентификатор попытки доставки callback
        taskId:
          type: integer
          format: int64
          minimum: 1
        externalId:
          type: string
          format: uuid
          description: Идентификатор задачи на стороне сервиса-клиента
        clientService:
          type: string
          minLength: 1
          examples:
            - user-expertise
            - invest-pay
        status:
          $ref: '#/components/schemas/AsyncTaskStatus'
        result:
          oneOf:
            - $ref: '#/components/schemas/ResultMap'
            - type: 'null'
          description: |
            Для DONE содержит Map<String, String>. Если исходное значение
            результата было null, значение в map тоже сериализуется как null.
            Для FAILED, DEAD и CANCELLED равно null, а причина передается
            в error.
        error:
          oneOf:
            - $ref: '#/components/schemas/CallbackError'
            - type: 'null'
          description: |
            Для DONE равно null. Для FAILED, DEAD и CANCELLED содержит
            структурированную причину финального статуса.
        finishedAt:
          type: number
          format: double
          description: |
            Момент финального завершения async-задачи в фактической JSON-
            сериализации HTTP callback client: Unix epoch seconds, возможно
            с дробной частью для nanoseconds.
    ResultMap:
      type: object
      additionalProperties:
        type:
          - string
          - 'null'
      description: Результат выполнения запроса во внешний сервис в формате Map<String, String>
      examples:
        - decision: APPROVED
          score: '82'
          reasonCode: OK
    AsyncTaskStatus:
      type: string
      enum:
        - DONE
        - FAILED
        - DEAD
        - CANCELLED
      description: |
        FAILED означает финальную неретраибельную ошибку.
        DEAD означает, что retry upstream исчерпаны.
        CANCELLED означает отмену до старта upstream-вызова.
    CallbackError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - retryable
      properties:
        code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        retryable:
          type: boolean
          description: Возможность ручного retry; автоматические retry upstream уже завершены до финального callback.
