databaseChangeLog:
  - changeSet:
      id: 001-create-external-gateway-schema
      author: codex
      changes:
        - sql:
            sql: CREATE SCHEMA IF NOT EXISTS ${externalGatewaySchema};

  - changeSet:
      id: 002-create-slot-tables
      author: codex
      changes:
        - createTable:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  type: int
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ext_slots
                    nullable: false
              - column:
                  name: lease_id
                  type: uuid
              - column:
                  name: owner
                  type: varchar(160)
              - column:
                  name: kind
                  type: varchar(16)
              - column:
                  name: acquired_at
                  type: timestamp with time zone
              - column:
                  name: expires_at
                  type: timestamp with time zone
              - column:
                  name: task_id
                  type: varchar(80)
        - createTable:
            schemaName: ${externalGatewaySchema}
            tableName: ext_sync_waiters
            columns:
              - column:
                  name: waiter_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ext_sync_waiters
                    nullable: false
              - column:
                  name: owner
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: registered_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - sql:
            splitStatements: true
            sql: |
              ALTER TABLE ${externalGatewaySchema}.ext_slots
                ADD CONSTRAINT chk_ext_slots_kind
                CHECK (kind IS NULL OR kind IN ('SYNC', 'ASYNC'));

              ALTER TABLE ${externalGatewaySchema}.ext_slots
                ADD CONSTRAINT chk_ext_slots_lease_shape
                CHECK (
                  (lease_id IS NULL AND owner IS NULL AND kind IS NULL AND acquired_at IS NULL AND expires_at IS NULL AND task_id IS NULL)
                  OR
                  (lease_id IS NOT NULL AND owner IS NOT NULL AND kind IS NOT NULL AND acquired_at IS NOT NULL AND expires_at IS NOT NULL)
                );

              CREATE INDEX idx_ext_slots_busy_kind_expires
                ON ${externalGatewaySchema}.ext_slots (kind, expires_at)
                WHERE lease_id IS NOT NULL;

              CREATE INDEX idx_ext_sync_waiters_expires_at
                ON ${externalGatewaySchema}.ext_sync_waiters (expires_at);
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 1
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 2
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 3
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 4
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 5

  - changeSet:
      id: 003-create-request-queue
      author: codex
      changes:
        - createTable:
            schemaName: ${externalGatewaySchema}
            tableName: ext_request_queue
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ext_request_queue
                    nullable: false
              - column:
                  name: external_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: client_service
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: priority_weight
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: delivery_mode
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(24)
                  constraints:
                    nullable: false
              - column:
                  name: callback_delivery_status
                  type: varchar(24)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: result
                  type: jsonb
              - column:
                  name: error
                  type: jsonb
              - column:
                  name: attempts
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: max_attempts
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: available_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: timestamp with time zone
              - column:
                  name: finished_at
                  type: timestamp with time zone
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: text
              - column:
                  name: retryable
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            schemaName: ${externalGatewaySchema}
            tableName: ext_request_queue
            columnNames: client_service, external_id
            constraintName: uq_ext_request_queue_idempotency
        - sql:
            splitStatements: true
            sql: |
              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_priority
                CHECK (priority IN ('HIGH', 'LOW'));

              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_delivery_mode
                CHECK (delivery_mode IN ('CALLBACK', 'POLLING'));

              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_status
                CHECK (status IN ('PENDING', 'IN_PROGRESS', 'DONE', 'FAILED', 'DEAD', 'CANCELLED'));

              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_callback_status
                CHECK (callback_delivery_status IN ('NOT_REQUIRED', 'PENDING', 'DELIVERING', 'DELIVERED', 'RETRY', 'DEAD'));

              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_attempts
                CHECK (attempts >= 0 AND max_attempts >= 1);

              CREATE INDEX idx_ext_request_queue_claim
                ON ${externalGatewaySchema}.ext_request_queue (priority_weight DESC, available_at ASC, id ASC)
                WHERE status = 'PENDING';

              CREATE INDEX idx_ext_request_queue_external_id
                ON ${externalGatewaySchema}.ext_request_queue (external_id);

  - changeSet:
      id: 004-create-callback-delivery
      author: codex
      changes:
        - createTable:
            schemaName: ${externalGatewaySchema}
            tableName: ext_callback_delivery
            columns:
              - column:
                  name: delivery_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ext_callback_delivery
                    nullable: false
              - column:
                  name: task_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: callback_url
                  type: text
              - column:
                  name: status
                  type: varchar(24)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: attempts
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: max_attempts
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: available_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: timestamp with time zone
              - column:
                  name: completed_at
                  type: timestamp with time zone
              - column:
                  name: last_error
                  type: text
        - addUniqueConstraint:
            schemaName: ${externalGatewaySchema}
            tableName: ext_callback_delivery
            columnNames: task_id
            constraintName: uq_ext_callback_delivery_task
        - addForeignKeyConstraint:
            baseTableSchemaName: ${externalGatewaySchema}
            baseTableName: ext_callback_delivery
            baseColumnNames: task_id
            constraintName: fk_ext_callback_delivery_task
            referencedTableSchemaName: ${externalGatewaySchema}
            referencedTableName: ext_request_queue
            referencedColumnNames: id
            onDelete: CASCADE
        - sql:
            splitStatements: true
            sql: |
              ALTER TABLE ${externalGatewaySchema}.ext_callback_delivery
                ADD CONSTRAINT chk_ext_callback_delivery_status
                CHECK (status IN ('PENDING', 'DELIVERING', 'DELIVERED', 'RETRY', 'DEAD'));

              ALTER TABLE ${externalGatewaySchema}.ext_callback_delivery
                ADD CONSTRAINT chk_ext_callback_delivery_attempts
                CHECK (attempts >= 0 AND max_attempts >= 1);

              ALTER TABLE ${externalGatewaySchema}.ext_callback_delivery
                ADD CONSTRAINT chk_ext_callback_delivery_url
                CHECK (status = 'DEAD' OR callback_url IS NOT NULL);

              CREATE INDEX idx_ext_callback_delivery_claim
                ON ${externalGatewaySchema}.ext_callback_delivery (available_at ASC, created_at ASC, delivery_id ASC)
                WHERE status IN ('PENDING', 'RETRY');
