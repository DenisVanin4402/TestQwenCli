spring.application.name=test-qwen-cli
springdoc.api-docs.path=/v3/api-docs
logging.charset.console=${LOGGING_CHARSET_CONSOLE:IBM866}
external-gateway.repository.type=memory
# Для PostgreSQL mode задайте external-gateway.repository.type=postgres и раскомментируйте параметры ниже.
# external-gateway.postgres.jdbc-url=jdbc:postgresql://localhost:5432/external_gateway
# external-gateway.postgres.username=external_gateway
# external-gateway.postgres.password=change-me
external-gateway.postgres.schema=external_gateway
external-gateway.postgres.liquibase-enabled=true
external-gateway.slots.total=5
external-gateway.slots.target-free-sync-slots=1
external-gateway.slots.lease-ttl=30s
external-gateway.slots.sync-waiter-ttl=5s
external-gateway.slots.sync-acquire-poll-interval=10ms
# polling - дефолтное ожидание через sleep между попытками; listen_notify - PostgreSQL LISTEN/NOTIFY с fallback на интервал выше.
external-gateway.slots.sync-acquire-wait-mode=polling
external-gateway.sync.wait-timeout-ms=1500
external-gateway.async.dispatcher-enabled=true
external-gateway.async.dispatch-interval-ms=100
external-gateway.async.dispatch-batch-size=32
external-gateway.async.max-attempts=3
external-gateway.async.retry-backoff-ms=1000
external-gateway.callback.delivery-enabled=true
external-gateway.callback.delivery-interval-ms=100
external-gateway.callback.delivery-batch-size=10
external-gateway.callback.max-attempts=3
external-gateway.callback.retry-backoff-ms=1000
external-gateway.clients.user-expertise.callback-url=http://user-expertise/internal/external-gateway/callbacks
external-gateway.clients.invest-pay.callback-url=http://invest-pay/internal/external-gateway/callbacks
external-gateway.upstream.simulated-delay-ms=25
