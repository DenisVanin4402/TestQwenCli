databaseChangeLog:
  - changeSet:
      id: 001-create-external-gateway-schema
      author: codex
      changes:
        - sql:
            # Создает отдельную схему проекта. Все прикладные таблицы gateway лежат в ней,
            # чтобы не смешиваться с системными объектами PostgreSQL и таблицами других сервисов.
            sql: CREATE SCHEMA IF NOT EXISTS ${externalGatewaySchema};

  - changeSet:
      id: 002-create-slot-tables
      author: codex
      changes:
        # Таблица ext_slots хранит глобальный пул lease-слотов.
        # Слот - это разрешение на выполнение одного внешнего запроса.
        #
        # Поля:
        # - slot_id: номер слота из фиксированного пула. Значения заранее вставляются ниже,
        #   сейчас это 1..5. Используется как первичный ключ.
        # - lease_id: UUID текущего владения слотом. NULL означает, что слот свободен.
        #   Ненулевое значение проверяется при release/heartbeat, чтобы старый поток не мог
        #   освободить уже переиспользованный слот.
        # - owner: строковый идентификатор владельца lease. Для sync обычно содержит владельца
        #   запроса, для async - строку вида async:<clientService>:<taskId>. NULL только у
        #   свободного слота.
        # - kind: тип занятого слота. Допустимые значения: SYNC для синхронного запроса,
        #   ASYNC для асинхронной задачи. NULL только у свободного слота.
        # - acquired_at: момент захвата слота. NULL только у свободного слота.
        # - expires_at: момент истечения lease. Если lease просрочен, reaper может освободить
        #   слот даже без явного release. NULL только у свободного слота.
        # - task_id: id async-задачи, если слот занят ASYNC. Для SYNC и свободного слота может
        #   быть NULL.
        - createTable:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  type: int
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ext_slots
                    nullable: false
              - column:
                  name: lease_id
                  type: uuid
              - column:
                  name: owner
                  type: varchar(160)
              - column:
                  name: kind
                  type: varchar(16)
              - column:
                  name: acquired_at
                  type: timestamp with time zone
              - column:
                  name: expires_at
                  type: timestamp with time zone
              - column:
                  name: task_id
                  type: varchar(80)
        # Таблица ext_sync_waiters хранит sync-запросы, которые ждут свободный слот.
        # Пока есть живой waiter, async-захват слотов временно блокируется. Это защищает
        # синхронные запросы от starvation, когда вся емкость занята async-нагрузкой.
        #
        # Поля:
        # - waiter_id: UUID записи ожидания. Используется как первичный ключ и удаляется
        #   после завершения ожидания.
        # - owner: владелец ожидающего sync-запроса. Нужен для диагностики и корреляции.
        # - registered_at: момент регистрации ожидания.
        # - expires_at: момент истечения ожидания. Просроченные waiters удаляются при
        #   следующих операциях со слотами.
        - createTable:
            schemaName: ${externalGatewaySchema}
            tableName: ext_sync_waiters
            columns:
              - column:
                  name: waiter_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ext_sync_waiters
                    nullable: false
              - column:
                  name: owner
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: registered_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        # Ограничения для ext_slots фиксируют допустимые состояния lease.
        # Индексы ускоряют подсчет занятых слотов и очистку истекших waiters.
        - sql:
            splitStatements: true
            sql: |
              ALTER TABLE ${externalGatewaySchema}.ext_slots
                ADD CONSTRAINT chk_ext_slots_kind
                CHECK (kind IS NULL OR kind IN ('SYNC', 'ASYNC'));

              ALTER TABLE ${externalGatewaySchema}.ext_slots
                ADD CONSTRAINT chk_ext_slots_lease_shape
                CHECK (
                  (lease_id IS NULL AND owner IS NULL AND kind IS NULL AND acquired_at IS NULL AND expires_at IS NULL AND task_id IS NULL)
                  OR
                  (lease_id IS NOT NULL AND owner IS NOT NULL AND kind IS NOT NULL AND acquired_at IS NOT NULL AND expires_at IS NOT NULL)
                );

              CREATE INDEX idx_ext_slots_busy_kind_expires
                ON ${externalGatewaySchema}.ext_slots (kind, expires_at)
                WHERE lease_id IS NOT NULL;

              CREATE INDEX idx_ext_sync_waiters_expires_at
                ON ${externalGatewaySchema}.ext_sync_waiters (expires_at);
        # Начальный пул слотов. Количество строк должно соответствовать
        # external-gateway.slots.total, если конфигурация total не увеличивается миграцией.
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 1
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 2
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 3
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 4
        - insert:
            schemaName: ${externalGatewaySchema}
            tableName: ext_slots
            columns:
              - column:
                  name: slot_id
                  valueNumeric: 5

  - changeSet:
      id: 003-create-request-queue
      author: codex
      changes:
        # Таблица ext_request_queue хранит async-задачи внешнего gateway.
        # Это основная очередь: HTTP submit создает PENDING-задачу, dispatcher забирает ее
        # в IN_PROGRESS, вызывает upstream, затем переводит в финальный статус.
        #
        # Поля:
        # - id: внутренний последовательный id задачи. Используется в URL polling,
        #   callback payload и связях с callback-доставкой.
        # - external_id: внешний idempotency key клиента. В паре с client_service должен быть
        #   уникален, чтобы повторный submit той же операции возвращал существующую задачу.
        # - client_service: имя сервиса-клиента, например invest-pay или user-expertise.
        #   Участвует в idempotency и выборе callback URL.
        # - priority: приоритет задачи. Допустимые значения: HIGH для срочных задач,
        #   LOW для обычных.
        # - priority_weight: числовой вес priority. HIGH сейчас 100, LOW сейчас 10.
        #   Используется в ORDER BY при claim, чтобы HIGH обрабатывался раньше LOW.
        # - delivery_mode: способ получения результата. CALLBACK означает, что после
        #   финального статуса будет запланирована callback-доставка. POLLING означает,
        #   что клиент сам забирает результат и callback не нужен.
        # - status: состояние async-задачи. PENDING - ждет обработки или retry и доступна
        #   после available_at. IN_PROGRESS - dispatcher уже забрал задачу и держит async-слот.
        #   DONE - upstream успешно ответил, result заполнен. FAILED - финальная бизнес-ошибка,
        #   если появится отдельный неретраимый сценарий. DEAD - попытки исчерпаны после
        #   transient-ошибок. CANCELLED - задача отменена клиентом до обработки.
        # - callback_delivery_status: состояние доставки callback для этой задачи.
        #   NOT_REQUIRED - callback не нужен, обычно delivery_mode=POLLING. PENDING - callback
        #   ожидает отправки. DELIVERING - callback сейчас отправляется. DELIVERED - callback
        #   успешно доставлен. RETRY - доставка не удалась и будет повторена после available_at
        #   в ext_callback_delivery. DEAD - доставка невозможна или исчерпала попытки.
        # - payload: исходная JSON-нагрузка async-запроса.
        # - result: JSON-результат upstream, заполняется при status=DONE.
        # - error: JSON-описание ошибки, заполняется для DEAD, FAILED или CANCELLED.
        # - attempts: число попыток обработки upstream. Увеличивается при переходе в
        #   IN_PROGRESS, откатывается при возврате claim из-за отсутствия async-слота.
        # - max_attempts: максимальное число попыток upstream перед DEAD.
        # - created_at: момент создания задачи.
        # - available_at: момент, начиная с которого PENDING-задачу можно claim-ить.
        #   При retry сдвигается на retry_backoff.
        # - started_at: момент последнего перехода в IN_PROGRESS. NULL до claim и после
        #   возврата в PENDING.
        # - finished_at: момент финального завершения DONE, DEAD, FAILED или CANCELLED.
        # - updated_at: момент последнего изменения строки.
        # - last_error: текст последней transient-ошибки для диагностики.
        # - retryable: признак, что финальную FAILED/DEAD задачу можно вернуть в PENDING
        #   через ручной retry.
        - createTable:
            schemaName: ${externalGatewaySchema}
            tableName: ext_request_queue
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ext_request_queue
                    nullable: false
              - column:
                  name: external_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: client_service
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: priority_weight
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: delivery_mode
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(24)
                  constraints:
                    nullable: false
              - column:
                  name: callback_delivery_status
                  type: varchar(24)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: result
                  type: jsonb
              - column:
                  name: error
                  type: jsonb
              - column:
                  name: attempts
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: max_attempts
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: available_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: timestamp with time zone
              - column:
                  name: finished_at
                  type: timestamp with time zone
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: text
              - column:
                  name: retryable
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            # Гарантирует идемпотентность submit внутри одного client_service.
            schemaName: ${externalGatewaySchema}
            tableName: ext_request_queue
            columnNames: client_service, external_id
            constraintName: uq_ext_request_queue_idempotency
        # Ограничения фиксируют допустимые enum-значения и корректность счетчиков.
        # Индексы ускоряют claim PENDING-задач и поиск по external_id.
        - sql:
            splitStatements: true
            sql: |
              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_priority
                CHECK (priority IN ('HIGH', 'LOW'));

              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_delivery_mode
                CHECK (delivery_mode IN ('CALLBACK', 'POLLING'));

              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_status
                CHECK (status IN ('PENDING', 'IN_PROGRESS', 'DONE', 'FAILED', 'DEAD', 'CANCELLED'));

              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_callback_status
                CHECK (callback_delivery_status IN ('NOT_REQUIRED', 'PENDING', 'DELIVERING', 'DELIVERED', 'RETRY', 'DEAD'));

              ALTER TABLE ${externalGatewaySchema}.ext_request_queue
                ADD CONSTRAINT chk_ext_request_queue_attempts
                CHECK (attempts >= 0 AND max_attempts >= 1);

              CREATE INDEX idx_ext_request_queue_claim
                ON ${externalGatewaySchema}.ext_request_queue (priority_weight DESC, available_at ASC, id ASC)
                WHERE status = 'PENDING';

              CREATE INDEX idx_ext_request_queue_external_id
                ON ${externalGatewaySchema}.ext_request_queue (external_id);

  - changeSet:
      id: 004-create-callback-delivery
      author: codex
      changes:
        # Таблица ext_callback_delivery хранит отдельную очередь доставки callback.
        # Она создается для финальных async-задач с delivery_mode=CALLBACK. Если callback URL
        # отсутствует в allow-list, запись сразу создается в DEAD без callback_url.
        #
        # Поля:
        # - delivery_id: UUID доставки callback. Используется как первичный ключ и стабильный
        #   идентификатор попыток доставки.
        # - task_id: ссылка на ext_request_queue.id. Для одной задачи разрешена только одна
        #   callback-доставка.
        # - callback_url: целевой URL клиента. NULL допустим только для DEAD, когда доставка
        #   невозможна, например из-за отсутствия allow-list URL.
        # - status: состояние доставки. PENDING - ожидает отправки. DELIVERING - dispatcher
        #   забрал доставку и выполняет HTTP-вызов. DELIVERED - клиент принял callback.
        #   RETRY - предыдущая попытка завершилась ошибкой, доставка станет доступной после
        #   available_at. DEAD - доставка невозможна или исчерпала max_attempts.
        # - payload: JSON тела callback, собранный из финального состояния async-задачи.
        # - attempts: число попыток HTTP-доставки. Увеличивается при claim в DELIVERING.
        # - max_attempts: максимальное число попыток перед DEAD.
        # - created_at: момент постановки callback в очередь.
        # - available_at: момент, начиная с которого PENDING/RETRY доставку можно claim-ить.
        # - started_at: момент последнего перехода в DELIVERING.
        # - completed_at: момент финального завершения DELIVERED или DEAD.
        # - last_error: текст последней ошибки доставки.
        - createTable:
            schemaName: ${externalGatewaySchema}
            tableName: ext_callback_delivery
            columns:
              - column:
                  name: delivery_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ext_callback_delivery
                    nullable: false
              - column:
                  name: task_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: callback_url
                  type: text
              - column:
                  name: status
                  type: varchar(24)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: attempts
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: max_attempts
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: available_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: timestamp with time zone
              - column:
                  name: completed_at
                  type: timestamp with time zone
              - column:
                  name: last_error
                  type: text
        - addUniqueConstraint:
            # Одна async-задача должна иметь не более одной записи callback-доставки.
            schemaName: ${externalGatewaySchema}
            tableName: ext_callback_delivery
            columnNames: task_id
            constraintName: uq_ext_callback_delivery_task
        - addForeignKeyConstraint:
            # При удалении задачи удаляется и связанная callback-доставка.
            baseTableSchemaName: ${externalGatewaySchema}
            baseTableName: ext_callback_delivery
            baseColumnNames: task_id
            constraintName: fk_ext_callback_delivery_task
            referencedTableSchemaName: ${externalGatewaySchema}
            referencedTableName: ext_request_queue
            referencedColumnNames: id
            onDelete: CASCADE
        # Ограничения фиксируют допустимые состояния доставки, счетчики попыток
        # и обязательность callback_url для всех доставляемых статусов.
        - sql:
            splitStatements: true
            sql: |
              ALTER TABLE ${externalGatewaySchema}.ext_callback_delivery
                ADD CONSTRAINT chk_ext_callback_delivery_status
                CHECK (status IN ('PENDING', 'DELIVERING', 'DELIVERED', 'RETRY', 'DEAD'));

              ALTER TABLE ${externalGatewaySchema}.ext_callback_delivery
                ADD CONSTRAINT chk_ext_callback_delivery_attempts
                CHECK (attempts >= 0 AND max_attempts >= 1);

              ALTER TABLE ${externalGatewaySchema}.ext_callback_delivery
                ADD CONSTRAINT chk_ext_callback_delivery_url
                CHECK (status = 'DEAD' OR callback_url IS NOT NULL);

              CREATE INDEX idx_ext_callback_delivery_claim
                ON ${externalGatewaySchema}.ext_callback_delivery (available_at ASC, created_at ASC, delivery_id ASC)
                WHERE status IN ('PENDING', 'RETRY');
